server.port=8081
spring.application.name=insightmail-mail-service

# Disable auto-config for mail (we configure dynamically per request)
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Increase max request size for base64 chart images
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.mvc.async.request-timeout=60000

# Logging
logging.level.com.insightmail=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%thread] %highlight(%-5level) %cyan(%logger{24}) - %msg%n
