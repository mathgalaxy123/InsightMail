<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightMail — Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <!-- ── Top Bar ── -->
    <div class="topbar">
      <div class="logo">🧾 InsightMail</div>
    </div>

    <!-- ── Center Wrapper ── -->
    <div class="center-wrap">
      <div class="login-card">
        <div class="card-logo">🧾</div>
        <div class="card-title">InsightMail</div>
        <div class="card-subtitle">Sign in to manage your reports</div>

        <!-- ── Tabs ── -->
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">
            Login
          </button>
          <button class="auth-tab" onclick="switchTab('signup')">
            Sign Up
          </button>
        </div>

        <!-- ── Login Form ── -->
        <div class="form-section active" id="loginForm">
          <div class="success-msg" id="loginSuccess">
            Login successful! Redirecting...
          </div>
          <div class="error-msg" id="loginError">
            Invalid email or password.
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Enter your password"
            />
          </div>
          <div class="forgot">
            <a href="#">Forgot password?</a>
          </div>
          <button class="btn-submit" onclick="handleLogin()">Sign In</button>
          <div class="divider">
            <hr />
            <span>or</span>
            <hr />
          </div>
          <button class="btn-google">G &nbsp; Continue with Google</button>
        </div>

        <!-- ── Signup Form ── -->
        <div class="form-section" id="signupForm">
          <div class="success-msg" id="signupSuccess">
            Account created! You can now log in.
          </div>
          <div class="error-msg" id="signupError">
            Please fill in all fields correctly.
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Bipin Yashasvi" />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signupPassword"
              placeholder="Create a password"
            />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input
              type="password"
              id="signupConfirm"
              placeholder="Re-enter your password"
            />
          </div>
          <button class="btn-submit" onclick="handleSignup()">
            Create Account
          </button>
          <div class="divider">
            <hr />
            <span>or</span>
            <hr />
          </div>
          <button class="btn-google">G &nbsp; Continue with Google</button>
        </div>

        <div class="terms">
          By continuing, you agree to InsightMail's
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
      </div>
    </div>

    <!-- ── JS ── -->
    <script src="js/api.js"></script>
    <script>
      function switchTab(tab) {
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".form-section")
          .forEach((f) => f.classList.remove("active"));
        if (tab === "login") {
          document.querySelectorAll(".auth-tab")[0].classList.add("active");
          document.getElementById("loginForm").classList.add("active");
        } else {
          document.querySelectorAll(".auth-tab")[1].classList.add("active");
          document.getElementById("signupForm").classList.add("active");
        }
      }

      function handleLogin() {
        let email = document.getElementById("loginEmail").value;
        let password = document.getElementById("loginPassword").value;
        document.getElementById("loginSuccess").style.display = "none";
        document.getElementById("loginError").style.display = "none";
        if (email === "" || password === "") {
          document.getElementById("loginError").style.display = "block";
          return;
        }
        document.getElementById("loginSuccess").style.display = "block";
        setTimeout(function () {
          window.location.href = "index.html";
        }, 1500);
      }

      function handleSignup() {
        let name = document.getElementById("signupName").value;
        let email = document.getElementById("signupEmail").value;
        let password = document.getElementById("signupPassword").value;
        let confirm = document.getElementById("signupConfirm").value;
        document.getElementById("signupSuccess").style.display = "none";
        document.getElementById("signupError").style.display = "none";
        if (name === "" || email === "" || password === "" || confirm === "") {
          document.getElementById("signupError").style.display = "block";
          document.getElementById("signupError").textContent =
            "Please fill in all fields.";
          return;
        }
        if (password !== confirm) {
          document.getElementById("signupError").style.display = "block";
          document.getElementById("signupError").textContent =
            "Passwords do not match!";
          return;
        }
        document.getElementById("signupSuccess").style.display = "block";
        setTimeout(function () {
          switchTab("login");
        }, 1500);
      }
    </script>
  </body>
</html>
