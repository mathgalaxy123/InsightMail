<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — InsightMail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --auth-bg: radial-gradient(circle at top right, #312e81, #0f172a);
    }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--auth-bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      z-index: 10;
    }
    .auth-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: white;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }
    .auth-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-tertiary);
      margin-top: 0.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: white;
      font-size: 0.95rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
    .auth-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }
    .auth-btn:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }
    .auth-btn:active {
      transform: translateY(0);
    }
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }
    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .auth-link:hover {
      text-decoration: underline;
    }
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 0.75rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    /* Animated background elements */
    .bg-blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: var(--primary);
      filter: blur(120px);
      opacity: 0.15;
      border-radius: 50%;
      z-index: 1;
      animation: float 20s infinite alternate;
    }
    .blob-1 { top: -100px; right: -100px; }
    .blob-2 { bottom: -100px; left: -100px; background: #8b5cf6; }
    @keyframes float {
      from { transform: translate(0, 0); }
      to { transform: translate(50px, 50px); }
    }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:24px;height:24px">
            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <h1 class="auth-title" id="authTitle">Welcome Back</h1>
        <p class="auth-subtitle" id="authSubtitle">Login to access your InsightMail reports</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="authForm">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label class="form-label">Full Name</label>
          <input type="text" id="nameInput" class="form-input" placeholder="Enter your name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="emailInput" class="form-input" placeholder="name@company.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="passwordInput" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        <span id="footerText">Don't have an account?</span>
        <a class="auth-link" id="toggleAuth">Create Account</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
